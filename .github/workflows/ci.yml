name: CI

# Safety check only — no deploy automation. Runs on PRs and pushes to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Self-merge team: CI is the safety net, so lint runs here too. ESLint
      # exits non-zero only on errors (warnings are allowed), so this gates new
      # errors without blocking on the pre-existing warning baseline.
      - run: npm run lint
      - run: npm test
      - run: npm run build
