<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MochiPOS · Claim your workspace</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; min-height: 100vh; background: var(--bg); background-image: radial-gradient(ellipse 80% 60% at 50% -20%, var(--lavender-100) 0%, transparent 50%), var(--grad-page); }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }

  .ob-shell { min-height: 100vh; display: flex; flex-direction: column; }

  /* ─── Header ─────────────────────────────────────────────────────────── */
  .ob-header {
    height: 64px; padding: 0 32px;
    display: flex; align-items: center; gap: 32px;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .ob-brand { display: flex; align-items: center; gap: 10px; }
  .ob-brand img { width: 32px; height: 32px; }
  .ob-helper { margin-left: auto; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .ob-helper a { color: var(--indigo-600); text-decoration: none; }
  .ob-helper a:hover { text-decoration: underline; }

  /* ─── Top stepper ─────────────────────────────────────────────────────── */
  .ob-steps {
    list-style: none; padding: 0; margin: 0; flex: 1;
    display: flex; gap: 4px; justify-content: center;
    max-width: 720px;
  }
  .ob-step {
    flex: 1; display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; color: var(--muted-soft);
    cursor: default; position: relative; padding: 0 4px;
  }
  .ob-step::after {
    content: ""; position: absolute; left: calc(50% + 14px); right: -50%;
    top: 14px; height: 2px; background: var(--line);
  }
  .ob-step:last-child::after { display: none; }
  .ob-step-bub {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--panel); border: 2px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
    flex-shrink: 0; transition: all 200ms ease;
  }
  .ob-step-done .ob-step-bub { background: var(--success); color: white; border-color: var(--success); }
  .ob-step-done::after { background: var(--success); }
  .ob-step-now .ob-step-bub  { background: var(--indigo); color: white; border-color: var(--indigo); box-shadow: 0 0 0 4px var(--lavender-100); }
  .ob-step-now { color: var(--text); cursor: pointer; }
  .ob-step-done { color: var(--text); cursor: pointer; }
  .ob-step-future { cursor: not-allowed; }

  /* ─── Layout ─────────────────────────────────────────────────────────── */
  .ob-layout { display: flex; flex: 1; }
  .ob-stepper-sidebar .ob-steps { display: none; }
  .ob-stepper-minimal .ob-steps { display: none; }
  .ob-stepper-sidebar .ob-main { padding-top: 32px; }

  .ob-main {
    flex: 1; padding: 40px 32px 80px;
    max-width: 1080px; margin: 0 auto; width: 100%;
  }
  .ob-stepper-sidebar .ob-main { margin: 0; max-width: none; padding-left: 48px; padding-right: 48px; }

  /* ─── Sidebar variant ─────────────────────────────────────────────────── */
  .ob-side {
    width: 280px; flex-shrink: 0;
    border-right: 1px solid var(--line);
    background: var(--panel);
    padding: 32px 22px;
    display: flex; flex-direction: column;
  }
  .ob-side-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--muted-soft); margin-bottom: 16px; }
  .ob-side-steps { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; position: relative; }
  .ob-side-steps::before { content: ""; position: absolute; left: 13px; top: 24px; bottom: 24px; width: 2px; background: var(--line); }
  .ob-ss {
    display: flex; gap: 12px; padding: 8px 6px; border-radius: 10px;
    align-items: center; cursor: default; position: relative;
  }
  .ob-ss-bub {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--panel); border: 2px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: var(--muted-soft);
    flex-shrink: 0; z-index: 1; transition: all 200ms ease;
  }
  .ob-ss-now  .ob-ss-bub { background: var(--indigo); color: white; border-color: var(--indigo); box-shadow: 0 0 0 4px var(--lavender-100); }
  .ob-ss-done .ob-ss-bub { background: var(--success); color: white; border-color: var(--success); }
  .ob-ss-now, .ob-ss-done { cursor: pointer; }
  .ob-ss-lbl { font-size: 13px; font-weight: 700; color: var(--muted); }
  .ob-ss-now .ob-ss-lbl { color: var(--text); }
  .ob-ss-done .ob-ss-lbl { color: var(--text); }
  .ob-ss-meta { font-size: 11px; color: var(--muted-soft); font-weight: 700; margin-top: 2px; }
  .ob-ss-meta.ok { color: var(--success); }

  .ob-side-foot { margin-top: auto; padding-top: 24px; }
  .ob-side-card { background: var(--bg-soft); border-radius: 14px; padding: 14px; }
  .ob-side-card-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .ob-side-card-body { font-size: 12px; line-height: 1.5; color: var(--text); }

  /* ─── Minimal progress bar ───────────────────────────────────────────── */
  .ob-minimal-bar { max-width: 640px; margin: 0 auto 32px; }
  .ob-mb-track { height: 4px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .ob-mb-fill { height: 100%; background: var(--grad-accent); border-radius: 999px; transition: width 320ms ease; }
  .ob-mb-lbl { font-size: 12px; color: var(--muted); margin-top: 8px; font-weight: 700; }

  /* ─── Step wrappers ──────────────────────────────────────────────────── */
  .ob-step-wrap { animation: step-in 320ms cubic-bezier(.2,.7,.2,1); }
  @keyframes step-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .ob-h1 { font-size: 36px; letter-spacing: -.025em; line-height: 1.1; text-wrap: balance; }
  .ob-lede { font-size: 16px; line-height: 1.55; color: var(--muted); margin-top: 8px; max-width: 600px; text-wrap: pretty; }
  .ob-step-head { margin-bottom: 32px; }

  /* ─── Step 1: claim ──────────────────────────────────────────────────── */
  .ob-claim-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 56px; align-items: start; }
  .ob-claim-card {
    margin-top: 28px; padding: 22px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 18px; box-shadow: var(--shadow-card);
  }
  .ob-label { display: block; font-size: 12px; font-weight: 800; color: var(--text); }
  .ob-help { font-size: 12px; line-height: 1.4; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .ob-code-input {
    margin-top: 12px; display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px;
    border: 2px solid var(--line); background: var(--panel-2);
    transition: all 200ms ease;
  }
  .ob-code-input:focus-within { border-color: var(--lavender-300); background: var(--panel); box-shadow: 0 0 0 4px var(--lavender-100); }
  .ob-code-input.valid { border-color: var(--success); background: var(--success-bg); }
  .ob-code-input.invalid { border-color: var(--danger); }
  .ob-code-input input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: var(--font-mono); font-weight: 800;
    font-size: 22px; letter-spacing: .04em; color: var(--indigo);
  }
  .ob-code-ok { font-size: 12px; font-weight: 800; color: var(--success); display: inline-flex; align-items: center; gap: 4px; }

  .ob-claim-actions { margin-top: 28px; display: flex; flex-direction: column; gap: 14px; }
  .ob-claim-already { font-size: 13px; color: var(--muted); }
  .ob-claim-already a { color: var(--indigo-600); font-weight: 800; text-decoration: none; }
  .ob-claim-already a:hover { text-decoration: underline; }

  .ob-welcome-aside { display: flex; flex-direction: column; gap: 18px; }
  .ob-welcome-note {
    background: var(--grad-cream); border-radius: 18px; padding: 20px;
    border: 1px solid rgba(45,41,96,.06);
    position: relative;
  }
  .ob-welcome-note::before {
    content: "“"; position: absolute; top: -8px; left: 18px;
    font-family: var(--font-display); font-size: 48px; font-weight: 900;
    color: var(--lavender-700); opacity: .5; line-height: 1;
  }
  .ob-wn-from { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .ob-wn-name { font-weight: 800; font-size: 13px; }
  .ob-wn-body { font-size: 14px; line-height: 1.55; color: var(--text); text-wrap: pretty; }

  .ob-perks { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
  .ob-perks li { display: flex; gap: 14px; align-items: flex-start; }
  .ob-perk-icon {
    width: 38px; height: 38px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--indigo);
  }
  .ob-perk-1 { background: var(--lavender-100); }
  .ob-perk-2 { background: var(--cream); color: var(--text); }
  .ob-perk-3 { background: var(--success-bg); color: var(--success); }
  .ob-perk-h { font-size: 14px; font-weight: 800; }
  .ob-perk-d { font-size: 12.5px; color: var(--muted); margin-top: 2px; line-height: 1.45; }

  /* ─── Form steps (2, 3) ──────────────────────────────────────────────── */
  .ob-form-step { max-width: 720px; }
  .ob-form { display: flex; flex-direction: column; gap: 20px; max-width: 560px; }
  .ob-field { display: flex; flex-direction: column; gap: 6px; }
  .ob-fieldrow { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .ob-input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--line); border-radius: 10px;
    background: var(--panel); font: inherit; font-size: 14px;
    color: var(--text); transition: all 160ms ease;
  }
  .ob-input:focus { outline: none; border-color: var(--lavender-300); box-shadow: 0 0 0 4px var(--lavender-100); }
  .ob-input.err { border-color: var(--danger); }
  .ob-input[readonly] { background: var(--bg-soft); color: var(--muted); }
  select.ob-input { cursor: pointer; }
  .ob-input-narrow { max-width: 100px; }
  .ob-err { font-size: 12px; color: var(--danger); margin-top: 4px; font-weight: 700; }
  .ob-ok  { font-size: 12px; color: var(--success); margin-top: 4px; font-weight: 700; display: flex; align-items: center; gap: 4px; }

  .ob-check {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 14px 16px; background: var(--bg-soft); border-radius: 12px;
    font-size: 13px; line-height: 1.5; cursor: pointer;
  }
  .ob-check input { margin-top: 2px; accent-color: var(--indigo); width: 16px; height: 16px; }
  .ob-check a { color: var(--indigo-600); font-weight: 700; }

  .ob-step-foot {
    margin-top: 36px; padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* Password strength */
  .ob-strength { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .ob-strength-bars { display: flex; gap: 3px; }
  .ob-strength-bar { width: 36px; height: 4px; border-radius: 2px; background: var(--line); }
  .ob-strength-bar.on.s-0 { background: var(--danger); }
  .ob-strength-bar.on.s-1 { background: var(--warn); }
  .ob-strength-bar.on.s-2 { background: var(--info); }
  .ob-strength-bar.on.s-3 { background: var(--success); }
  .ob-strength-lbl { font-size: 12px; font-weight: 700; color: var(--muted); }

  /* Workspace step subdomain */
  .ob-subdomain { display: flex; align-items: stretch; border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden; transition: all 160ms ease; background: var(--panel); }
  .ob-subdomain:focus-within { border-color: var(--lavender-300); box-shadow: 0 0 0 4px var(--lavender-100); }
  .ob-sub-input { border: none; border-radius: 0; flex: 1; background: transparent; }
  .ob-sub-input:focus { box-shadow: none; }
  .ob-sub-input.err { background: var(--danger-bg); }
  .ob-sub-suffix {
    padding: 0 14px; display: flex; align-items: center;
    background: var(--panel-2); border-left: 1px solid var(--line);
    font-size: 14px; font-weight: 700; color: var(--muted);
    font-family: var(--font-mono);
  }

  /* Booth cards */
  .ob-booth-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 4px; }
  .ob-booth-card {
    text-align: left; background: var(--panel); border: 1.5px solid var(--line);
    padding: 14px; border-radius: 12px; cursor: pointer; font: inherit; color: inherit;
    transition: all 160ms ease;
  }
  .ob-booth-card:hover { border-color: var(--lavender-300); }
  .ob-booth-card.on { border-color: var(--indigo); background: var(--indigo-50); }
  .ob-booth-title { font-size: 13px; font-weight: 800; }
  .ob-booth-desc { font-size: 11.5px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .ob-booth-meta { font-size: 10.5px; font-weight: 800; color: var(--lavender-700); letter-spacing: .04em; text-transform: uppercase; margin-top: 8px; }

  /* Receipt preview */
  .ob-receipt-preview { margin-top: 8px; padding: 20px; background: var(--bg-soft); border-radius: 16px; }
  .ob-rp-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .ob-receipt {
    background: var(--grad-cream);
    border-radius: 12px; padding: 18px;
    max-width: 280px; box-shadow: var(--shadow-card);
    font-family: var(--font-mono); font-size: 12px; color: var(--text);
  }
  .ob-r-brand { font-family: var(--font-display); font-size: 16px; font-weight: 900; color: var(--indigo); text-align: center; letter-spacing: -.02em; }
  .ob-r-sub { font-size: 10px; color: var(--muted); text-align: center; margin-top: 2px; }
  .ob-r-line { border-top: 1px dashed rgba(45,41,96,.2); margin: 12px 0; }
  .ob-r-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .ob-r-total { font-weight: 800; font-size: 14px; }
  .ob-r-foot { margin-top: 12px; padding-top: 10px; border-top: 1px dashed rgba(45,41,96,.2); font-size: 10px; text-align: center; color: var(--text-2); }

  /* ─── Step 4: products ───────────────────────────────────────────────── */
  .ob-presets { margin-bottom: 24px; }
  .ob-presets-lbl { font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 12px; letter-spacing: .04em; text-transform: uppercase; }
  .ob-presets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .ob-preset-card {
    text-align: left; background: var(--panel); border: 1.5px solid var(--line);
    border-radius: 16px; padding: 18px; cursor: pointer; font: inherit; color: inherit;
    transition: all 200ms ease; display: flex; flex-direction: column; gap: 8px;
  }
  .ob-preset-card:hover { border-color: var(--lavender); transform: translateY(-2px); box-shadow: var(--shadow-card); }
  .ob-preset-h { font-size: 15px; font-weight: 800; }
  .ob-preset-d { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .ob-preset-items { font-size: 11.5px; color: var(--text-2); line-height: 1.6; margin-top: 4px; }
  .ob-preset-cta { font-size: 12px; font-weight: 800; color: var(--indigo-600); margin-top: auto; padding-top: 8px; }
  .ob-presets-or { text-align: center; font-size: 12px; color: var(--muted-soft); margin: 18px 0; font-weight: 700; }

  .ob-products { display: flex; flex-direction: column; gap: 8px; }
  .ob-prod-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px;
  }
  .ob-prod-img { width: 48px; height: 48px; border-radius: 10px; background: var(--lavender-100); flex-shrink: 0; }
  .ob-prod-info { flex: 1; min-width: 0; }
  .ob-prod-name { font-size: 14px; font-weight: 700; }
  .ob-prod-sku { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); }
  .ob-prod-stat { text-align: right; font-size: 11px; color: var(--muted); font-weight: 700; }
  .ob-prod-stat span { display: block; font-size: 16px; color: var(--text); font-variant-numeric: tabular-nums; }
  .ob-prod-price { font-size: 16px; font-weight: 800; min-width: 80px; text-align: right; }
  .ob-prod-x { width: 26px; height: 26px; border-radius: 8px; border: 1px solid var(--line); background: var(--panel); color: var(--muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .ob-prod-x:hover { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }

  .ob-prod-draft { background: var(--lavender-100); border-color: var(--lavender-300); gap: 10px; }
  .ob-prod-draft .ob-input { padding: 8px 12px; font-size: 13px; }
  .ob-prod-draft-acts { display: flex; gap: 6px; }

  .ob-prod-add {
    display: flex; align-items: center; gap: 10px; justify-content: center;
    padding: 16px; border: 1.5px dashed var(--line); border-radius: 12px;
    background: transparent; cursor: pointer; font: inherit;
    font-size: 13px; font-weight: 700; color: var(--muted); width: 100%;
    transition: all 160ms ease;
  }
  .ob-prod-add:hover { border-color: var(--lavender-300); background: var(--lavender-100); color: var(--indigo); }
  .ob-prod-add-icon { width: 22px; height: 22px; border-radius: 50%; background: var(--lavender-200); color: var(--indigo); display: inline-flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; line-height: 1; }
  .ob-prod-summary { margin-top: 14px; font-size: 13px; color: var(--muted); padding: 10px 14px; background: var(--bg-soft); border-radius: 10px; }
  .ob-prod-summary strong { color: var(--text); font-variant-numeric: tabular-nums; }

  /* ─── Step 5: event ──────────────────────────────────────────────────── */
  .ob-suggested { margin-bottom: 28px; }
  .ob-suggested-lbl { font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 12px; letter-spacing: .04em; text-transform: uppercase; }
  .ob-suggested-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .ob-sug-card {
    display: flex; gap: 14px; align-items: center; text-align: left;
    background: var(--panel); border: 1.5px solid var(--line); border-radius: 14px;
    padding: 14px; cursor: pointer; font: inherit; color: inherit;
    transition: all 200ms ease;
  }
  .ob-sug-card:hover { border-color: var(--lavender); transform: translateY(-2px); box-shadow: var(--shadow-card); }
  .ob-sug-date {
    background: var(--cream); border-radius: 10px;
    padding: 6px 10px; text-align: center; flex-shrink: 0; min-width: 52px;
  }
  .ob-sug-mon { font-size: 10px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--text-2); }
  .ob-sug-day { font-size: 20px; font-weight: 900; color: var(--indigo); line-height: 1; }
  .ob-sug-name { font-size: 13px; font-weight: 800; line-height: 1.25; }
  .ob-sug-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ob-sug-dates { font-size: 11px; margin-top: 4px; }

  .ob-alloc-card {
    margin-top: 12px; padding: 16px 18px;
    background: var(--cream); border-radius: 14px;
    border: 1px solid var(--cream-deep);
  }
  .ob-alloc-h { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; color: var(--text); }
  .ob-alloc-body { font-size: 13px; line-height: 1.55; color: var(--text-2); margin-top: 6px; }
  .ob-alloc-body code { color: var(--indigo); font-family: var(--font-mono); font-size: 12px; }
  .ob-alloc-body strong { color: var(--text); }

  /* ─── Step 6: live ───────────────────────────────────────────────────── */
  .ob-live { position: relative; max-width: 880px; margin: 0 auto; }
  .ob-live-hero { text-align: center; padding: 24px 0 12px; position: relative; z-index: 1; }
  .ob-live-mascot { display: inline-block; position: relative; }
  .ob-live-mascot img {
    width: 110px; height: 110px;
    animation: live-bob 2.4s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(45,41,96,.18));
  }
  @keyframes live-bob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-8px) rotate(2deg); }
  }
  .ob-warmth-minimal .ob-live-mascot { display: none; }

  .ob-live-ws {
    display: inline-flex; gap: 10px; align-items: center;
    margin-top: 20px; padding: 8px 8px 8px 16px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 999px; box-shadow: var(--shadow-rest);
    font-size: 13px; font-weight: 700; color: var(--indigo);
    font-family: var(--font-mono);
  }

  .ob-live-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-top: 32px;
  }
  .ob-live-card {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 22px; border-radius: 16px;
    background: var(--panel); border: 1px solid var(--line);
    box-shadow: var(--shadow-rest);
    text-decoration: none; color: var(--text);
    transition: all 200ms ease;
  }
  .ob-live-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); border-color: var(--lavender-300); }
  .ob-live-card.primary {
    background: var(--grad-primary); color: white;
    border-color: var(--indigo);
  }
  .ob-live-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--lavender-100); color: var(--indigo);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ob-live-card.primary .ob-live-icon { background: rgba(255,255,255,.15); color: white; }
  .ob-live-h { font-size: 15px; font-weight: 800; }
  .ob-live-d { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .ob-live-card.primary .ob-live-d { color: rgba(255,255,255,.7); }
  .ob-live-card > svg:last-child { margin-left: auto; opacity: .5; flex-shrink: 0; }

  .ob-live-note {
    margin-top: 32px; padding: 22px;
    background: var(--grad-cream); border-radius: 18px;
    border: 1px solid rgba(45,41,96,.06);
  }

  /* Confetti */
  .ob-confetti {
    position: absolute; inset: 0;
    overflow: hidden; pointer-events: none;
    height: 320px;
  }
  .ob-confetti-bit {
    position: absolute; top: -20px;
    border-radius: 2px;
    animation-name: confetti-fall;
    animation-timing-function: linear;
    animation-iteration-count: 1;
    animation-fill-mode: forwards;
    opacity: 0;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-40px) rotate(0deg);    opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(420px) rotate(720deg);  opacity: 0; }
  }

  /* ─── Buttons (reusing the admin patterns) ───────────────────────────── */
  .btn-primary {
    background: var(--grad-primary); color: var(--on-indigo);
    border: none; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-rest);
    transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); filter: brightness(1.08); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-primary.lg { padding: 14px 22px; font-size: 14.5px; }

  .btn-ghost {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--line); padding: 10px 14px;
    border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 160ms ease;
  }
  .btn-ghost:hover { border-color: var(--line-strong); background: var(--bg-soft); }
  .btn-mini {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--line); padding: 5px 10px;
    border-radius: 7px; font-size: 11.5px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-mini:hover { background: var(--bg-soft); }
  .btn-mini.primary { background: var(--indigo); color: white; border-color: var(--indigo); }
  .btn-mini:disabled { opacity: .4; cursor: not-allowed; }

  /* Avatar */
  .avatar {
    border-radius: 50%; flex-shrink: 0;
    background: var(--lavender-200); color: var(--indigo);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; letter-spacing: -.02em;
  }

  /* Density */
  .ob-density-compact .ob-step-head { margin-bottom: 20px; }
  .ob-density-compact .ob-form { gap: 14px; }
  .ob-density-compact .ob-h1 { font-size: 28px; }
  .ob-density-compact .ob-lede { font-size: 14px; }

  /* Responsive */
  @media (max-width: 900px) {
    .ob-claim-grid { grid-template-columns: 1fr; gap: 28px; }
    .ob-presets-grid, .ob-suggested-grid, .ob-booth-grid { grid-template-columns: 1fr; }
    .ob-live-grid { grid-template-columns: 1fr; }
    .ob-fieldrow { grid-template-columns: 1fr; }
    .ob-side { display: none; }
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- App scripts: chrome.jsx provides Icon + Avatar -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>

<script type="text/babel" data-presets="react">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "stepper": "stepper",
    "warmth": "balanced",
    "density": "regular"
  }/*EDITMODE-END*/;

  function Root() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    return (
      <div className={"ob-density-" + t.density}>
        <OnboardingApp t={t} setTweak={setTweak} />
        <TweaksPanel>
          <TweakSection label="Stepper" />
          <TweakRadio
            label="Style"
            value={t.stepper}
            options={[
              { value: "stepper", label: "Top" },
              { value: "sidebar", label: "Side" },
              { value: "minimal", label: "Bar" }
            ]}
            onChange={(v) => setTweak("stepper", v)}
          />
          <TweakSection label="Brand warmth" />
          <TweakRadio
            label="Mascot use"
            value={t.warmth}
            options={[
              { value: "minimal",  label: "Minimal" },
              { value: "balanced", label: "Balanced" },
              { value: "generous", label: "Generous" }
            ]}
            onChange={(v) => setTweak("warmth", v)}
          />
          <TweakSection label="Density" />
          <TweakRadio
            label="Density"
            value={t.density}
            options={[
              { value: "compact", label: "Compact" },
              { value: "regular", label: "Regular" }
            ]}
            onChange={(v) => setTweak("density", v)}
          />
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>

</body>
</html>
