<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MochiPOS · Admin · Applications</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  /* ─── Base shell ─────────────────────────────────────────────────────── */
  html, body { height: 100%; }
  body { background: var(--bg); margin: 0; min-height: 100vh; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }

  .admin-shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }
  .admin-main  { display: flex; flex-direction: column; min-width: 0; }
  .admin-content { padding: 24px 32px 80px; max-width: 1480px; width: 100%; margin: 0 auto; }

  /* ─── Sidebar ────────────────────────────────────────────────────────── */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 22px 16px 18px;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .sb-brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 22px; }
  .sb-brand img { width: 32px; height: 32px; }
  .sb-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--lavender-700); margin-top: 2px; }
  .sb-section { font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--muted-soft); padding: 8px 10px 6px; }
  .sb-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .sb-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 10px;
    text-decoration: none; color: var(--muted);
    font-size: 13px; font-weight: 700;
    transition: background 160ms ease, color 160ms ease;
  }
  .sb-link:hover { color: var(--text); background: var(--bg-soft); }
  .sb-link.on { background: var(--indigo-50); color: var(--indigo); }
  .sb-link svg { opacity: .8; }
  .sb-link.on svg { opacity: 1; }
  .sb-count { margin-left: auto; font-size: 11px; font-weight: 800; background: var(--bg-soft); color: var(--muted); padding: 1px 7px; border-radius: 999px; min-width: 18px; text-align: center; }
  .sb-link.on .sb-count { background: var(--indigo); color: white; }

  .sb-foot { margin-top: 8px; }
  .sb-foot-card { background: var(--bg-soft); border-radius: 14px; padding: 12px; }
  .sb-foot-row { display: flex; align-items: center; gap: 10px; }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-ok { background: var(--success); box-shadow: 0 0 0 3px var(--success-bg); }
  .dot-warn { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-bg); }
  .dot-info { background: var(--info); box-shadow: 0 0 0 3px var(--info-bg); }

  /* ─── Topbar ─────────────────────────────────────────────────────────── */
  .topbar {
    height: var(--topbar-h); flex-shrink: 0;
    display: flex; align-items: center; gap: 16px;
    padding: 0 32px;
    background: var(--panel); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .crumb-muted { color: var(--muted); font-weight: 700; }
  .crumb-sep { color: var(--line-strong); }
  .crumb-now { color: var(--text); font-weight: 800; }
  .top-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .topbtn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--panel);
    color: var(--muted); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 160ms ease;
  }
  .topbtn:hover { color: var(--text); background: var(--bg-soft); border-color: var(--line-strong); }
  .me { width: 36px; height: 36px; border-radius: 50%; background: var(--lavender-200); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: var(--indigo); }

  .pill .dot { box-shadow: none; }
  .pill .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* ─── Page header ────────────────────────────────────────────────────── */
  .page-hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; margin-bottom: 28px; padding-top: 8px; }
  .page-hd .eyebrow { color: var(--lavender-700); }
  .hd-right { display: flex; gap: 20px; align-items: center; }
  .hd-stat { text-align: right; }
  .hd-stat-v { font-size: 36px; font-weight: 900; line-height: 1; letter-spacing: -.025em; }
  .hd-stat-l { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
  .hd-stat-cap { min-width: 200px; text-align: left; padding: 12px 16px; border-radius: 14px; background: var(--panel); border: 1px solid var(--line); box-shadow: var(--shadow-rest); }
  .hd-cap-track { height: 6px; background: var(--bg-soft); border-radius: 999px; overflow: hidden; }
  .hd-cap-fill { height: 100%; background: var(--grad-accent); border-radius: 999px; transition: width 320ms ease; }
  .hd-cap-lbl { font-size: 12px; color: var(--muted); margin-top: 8px; font-weight: 700; }
  .hd-cap-lbl strong { color: var(--text); }
  .hd-mascot { width: 84px; height: 84px; }

  /* ─── Filter bar ─────────────────────────────────────────────────────── */
  .filterbar {
    display: flex; align-items: center; gap: 16px; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .tabs { display: flex; gap: 2px; background: var(--panel); padding: 4px; border-radius: 14px; border: 1px solid var(--line); box-shadow: var(--shadow-rest); }
  .tab {
    border: none; background: transparent;
    padding: 8px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 700; color: var(--muted);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: all 160ms ease;
  }
  .tab:hover { color: var(--text); }
  .tab.on { background: var(--indigo); color: white; box-shadow: var(--shadow-rest); }
  .tab-count { font-size: 11px; font-weight: 800; background: var(--bg-soft); color: var(--muted); padding: 0px 7px; border-radius: 999px; min-width: 18px; text-align: center; }
  .tab.on .tab-count { background: rgba(255,255,255,.18); color: white; }
  .tab-count.hot { background: var(--lavender-200); color: var(--indigo); }

  .fb-right { display: flex; gap: 10px; align-items: center; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 0 12px;
    height: 38px; width: 280px;
    box-shadow: var(--shadow-rest);
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  .search:focus-within { border-color: var(--lavender-300); box-shadow: 0 0 0 4px var(--lavender-100); }
  .search svg { color: var(--muted); }
  .search input { border: none; outline: none; background: transparent; flex: 1; font: inherit; font-size: 13px; color: var(--text); }
  .search input::placeholder { color: var(--muted-soft); }
  .search-clear { border: none; background: transparent; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; display: inline-flex; }
  .search-clear:hover { background: var(--bg-soft); color: var(--text); }

  .seg-ctrl, .layout-seg {
    display: flex; gap: 2px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 3px; box-shadow: var(--shadow-rest);
  }
  .seg-ctrl button, .layout-seg button {
    border: none; background: transparent;
    padding: 6px 12px; border-radius: 7px;
    font-size: 12px; font-weight: 700; color: var(--muted);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: all 160ms ease;
  }
  .seg-ctrl button:hover, .layout-seg button:hover { color: var(--text); }
  .seg-ctrl button.on, .layout-seg button.on { background: var(--indigo-50); color: var(--indigo); }

  /* ─── Split view ─────────────────────────────────────────────────────── */
  .split { display: grid; grid-template-columns: 420px 1fr; gap: 16px; align-items: start; }
  .list-col { display: flex; flex-direction: column; gap: 8px; max-height: calc(100vh - 220px); overflow-y: auto; padding-right: 4px; }
  .list-col::-webkit-scrollbar { width: 8px; }
  .list-col::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  .list-card {
    text-align: left; border: 1px solid var(--line);
    background: var(--panel); border-radius: 16px;
    padding: 14px 16px; cursor: pointer;
    transition: all 160ms ease;
    box-shadow: var(--shadow-rest);
    display: flex; flex-direction: column; gap: 10px;
    font: inherit; color: inherit;
  }
  .list-card:hover { border-color: var(--lavender-300); transform: translateY(-1px); }
  .list-card.on {
    border-color: var(--indigo);
    background: var(--panel);
    box-shadow: 0 0 0 3px var(--lavender-100), var(--shadow-card);
  }
  .lc-head { display: flex; align-items: center; gap: 10px; }
  .lc-id { flex: 1; min-width: 0; }
  .lc-brand { font-size: 14px; font-weight: 800; color: var(--text); line-height: 1.2; }
  .lc-meta { font-size: 11.5px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .lc-body { display: flex; gap: 14px; font-size: 11.5px; color: var(--muted); align-items: center; }
  .lc-stat span { color: var(--text); font-weight: 800; font-variant-numeric: tabular-nums; }
  .lc-loc { margin-left: auto; }
  .lc-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--line-quiet); }
  .lc-sub { font-size: 11px; color: var(--muted); font-weight: 700; }
  .lc-code { font-family: var(--font-mono); font-size: 10px; color: var(--muted-soft); }

  /* density variants */
  .density-compact .list-card { padding: 10px 14px; gap: 6px; }
  .density-compact .list-card .lc-foot { padding-top: 6px; }
  .density-comfy .list-card { padding: 18px 20px; gap: 14px; }

  /* Empty */
  .empty { padding: 48px 16px; text-align: center; }
  .empty img { width: 56px; opacity: .8; }
  .empty h3 { margin-top: 12px; font-size: 16px; }
  .empty p { margin-top: 4px; color: var(--muted); font-size: 13px; }

  /* ─── Detail panel ───────────────────────────────────────────────────── */
  .detail {
    background: var(--panel); border-radius: 20px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-card);
    overflow: hidden;
    min-height: calc(100vh - 220px);
  }
  .dp-head {
    padding: 28px 28px 24px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
    flex-wrap: wrap;
  }
  .dp-id { display: flex; gap: 16px; align-items: flex-start; flex: 1 1 320px; min-width: 0; }
  .dp-id-text { min-width: 0; flex: 1; }
  .dp-brand-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .dp-brand-row h2 { line-height: 1.15; text-wrap: balance; }
  .dp-sub { font-size: 14px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .dp-id-line { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 10px; font-size: 12px; line-height: 1.4; }
  .dp-id-line code { font-family: var(--font-mono); color: var(--indigo-600); font-weight: 700; }
  .dp-dot { color: var(--line-strong); }

  .dp-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; align-items: center; }

  /* Narrow detail header: actions move to their own row */
  @media (max-width: 1340px) {
    .dp-actions { width: 100%; justify-content: flex-end; padding-top: 12px; border-top: 1px solid var(--line-quiet); margin-top: 4px; }
  }

  /* approved/rejected blocks */
  .dp-approved-block, .dp-rejected-block {
    padding: 14px 18px; border-radius: 14px; min-width: 240px;
  }
  .dp-approved-block { background: var(--success-bg); }
  .dp-rejected-block { background: var(--danger-bg); }
  .dp-approved-eyebrow, .dp-rejected-eyebrow {
    font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
  }
  .dp-approved-eyebrow { color: var(--success); }
  .dp-rejected-eyebrow { color: var(--danger); }
  .dp-approved-code {
    margin-top: 8px; font-family: var(--font-mono); font-weight: 800; font-size: 14px;
    color: var(--success); display: flex; align-items: center; gap: 8px;
  }
  .dp-approved-ws { margin-top: 4px; font-size: 12px; color: var(--success); font-weight: 700; opacity: .8; }

  /* Buttons */
  .btn-primary {
    background: var(--grad-primary); color: var(--on-indigo);
    border: none; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-rest);
    transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); filter: brightness(1.08); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-primary.lg { padding: 12px 20px; font-size: 14px; }

  .btn-ghost {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--line); padding: 10px 14px;
    border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 160ms ease;
  }
  .btn-ghost:hover { border-color: var(--line-strong); background: var(--bg-soft); }
  .btn-ghost.danger { color: var(--danger); }
  .btn-ghost.danger:hover { background: var(--danger-bg); border-color: var(--danger); }

  .btn-danger {
    background: var(--danger); color: white;
    border: none; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 160ms ease;
  }
  .btn-danger:hover { filter: brightness(1.1); }
  .btn-danger:disabled { opacity: .35; cursor: not-allowed; }

  .btn-mini {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--line); padding: 5px 10px;
    border-radius: 7px; font-size: 11.5px; font-weight: 800; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    transition: all 160ms ease;
  }
  .btn-mini:hover { background: var(--bg-soft); border-color: var(--line-strong); }
  .btn-mini.danger { color: var(--danger); }
  .btn-mini.danger:hover { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn-mini.primary {
    background: var(--indigo); color: white; border-color: var(--indigo);
  }
  .btn-mini.primary:hover { background: var(--indigo-700); border-color: var(--indigo-700); }

  /* Detail body grid */
  .dp-grid { display: grid; grid-template-columns: 1fr 320px; gap: 0; }
  .dp-main { padding: 24px 28px; border-right: 1px solid var(--line); }
  .dp-side { padding: 24px; background: var(--panel-2); }
  .dp-section { margin-bottom: 28px; }
  .dp-section:last-child { margin-bottom: 0; }
  .dp-section-h { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .dp-section h4 { font-size: 12px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .dp-pitch { font-size: 15px; line-height: 1.55; color: var(--text); text-wrap: pretty; }

  .dp-card { background: var(--panel); border-radius: 14px; padding: 16px 18px; border: 1px solid var(--line); margin-bottom: 12px; }

  .kv { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .kv li { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text); }
  .kv li svg { color: var(--muted); flex-shrink: 0; }
  .kv li a { color: var(--indigo-600); text-decoration: none; font-weight: 700; }
  .kv li a:hover { text-decoration: underline; }

  /* Timeline */
  .timeline { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0; position: relative; }
  .timeline::before {
    content: ""; position: absolute; left: 11px; top: 12px; bottom: 12px;
    width: 1px; background: var(--line);
  }
  .tl-row { display: flex; gap: 14px; padding: 8px 0; align-items: flex-start; position: relative; }
  .tl-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--panel); border: 2px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); flex-shrink: 0; z-index: 1;
  }
  .tl-approve .tl-dot { border-color: var(--success); color: var(--success); background: var(--success-bg); }
  .tl-reject  .tl-dot { border-color: var(--danger);  color: var(--danger);  background: var(--danger-bg); }
  .tl-info    .tl-dot { border-color: var(--warn);    color: var(--warn);    background: var(--warn-bg); }
  .tl-submit  .tl-dot { border-color: var(--lavender-700); color: var(--lavender-700); background: var(--lavender-100); }
  .tl-redeem  .tl-dot, .tl-email .tl-dot { border-color: var(--info); color: var(--info); background: var(--info-bg); }
  .tl-sale    .tl-dot { border-color: var(--indigo); color: var(--indigo); background: var(--indigo-50); }
  .tl-body { flex: 1; padding-top: 1px; }
  .tl-what { font-size: 13.5px; font-weight: 700; color: var(--text); line-height: 1.35; }
  .tl-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }

  /* Fit signal */
  .dp-signal .fit-pill {
    font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 999px;
  }
  .fit-ok   { background: var(--success-bg); color: var(--success); }
  .fit-info { background: var(--info-bg);    color: var(--info); }
  .fit-warn { background: var(--warn-bg);    color: var(--warn); }
  .signal-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .signal-list li { font-size: 12.5px; line-height: 1.4; display: flex; gap: 8px; align-items: flex-start; color: var(--text); }
  .sig-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; background: var(--muted); }
  .sig-ok .sig-dot { background: var(--success); }
  .sig-warn .sig-dot { background: var(--warn); }
  .sig-neutral .sig-dot { background: var(--muted-soft); }

  /* Avatar */
  .avatar {
    border-radius: 50%; flex-shrink: 0;
    background: var(--lavender-200); color: var(--indigo);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; letter-spacing: -.02em;
  }

  /* ─── Table view ─────────────────────────────────────────────────────── */
  .table-wrap { background: var(--panel); border-radius: 20px; border: 1px solid var(--line); box-shadow: var(--shadow-card); overflow: hidden; }
  .apps-table { width: 100%; border-collapse: collapse; }
  .apps-table th {
    text-align: left; padding: 14px 16px;
    font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); background: var(--panel-2);
    border-bottom: 1px solid var(--line);
  }
  .apps-table th.num-th { text-align: right; }
  .apps-table td {
    padding: 14px 16px;
    font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--line-quiet);
    vertical-align: middle;
  }
  .apps-table td.num-td { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
  .apps-table td.muted { color: var(--muted); }
  .apps-table tbody tr { cursor: pointer; transition: background 160ms ease; }
  .apps-table tbody tr:hover { background: var(--bg-soft); }
  .apps-table tbody tr.on { background: var(--lavender-100); }
  .apps-table tbody tr:last-child td { border-bottom: none; }
  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .tbl-code { font-family: var(--font-mono); font-size: 11px; color: var(--success); font-weight: 800; }

  /* Drawer */
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(28,24,56,.45);
    backdrop-filter: blur(2px); z-index: 100;
    display: flex; justify-content: flex-end;
    animation: backdrop-in 200ms ease;
  }
  .drawer {
    background: var(--bg); width: min(960px, 92vw); height: 100%;
    overflow-y: auto; position: relative;
    box-shadow: -20px 0 60px rgba(28,24,56,.2);
    animation: drawer-in 280ms cubic-bezier(.2,.7,.2,1);
  }
  .drawer .detail { border-radius: 0; border: none; min-height: 100%; }
  .drawer-x {
    position: absolute; top: 16px; right: 16px; z-index: 2;
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--panel); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text);
  }
  .drawer-x:hover { background: var(--bg-soft); }

  @keyframes backdrop-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes drawer-in   { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ─── Kanban view ────────────────────────────────────────────────────── */
  .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; align-items: start; }
  .kb-col { background: var(--panel-2); border-radius: 16px; padding: 12px; min-height: 320px; }
  .kb-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 0 4px; }
  .kb-title { font-size: 12px; font-weight: 800; color: var(--text); }
  .kb-count { margin-left: auto; font-size: 11px; font-weight: 800; background: var(--panel); color: var(--muted); padding: 1px 7px; border-radius: 999px; border: 1px solid var(--line); }
  .kb-body { display: flex; flex-direction: column; gap: 8px; }
  .kb-empty { text-align: center; color: var(--muted-soft); font-size: 12px; padding: 20px 0; }
  .kb-card {
    text-align: left; border: 1px solid var(--line);
    background: var(--panel); border-radius: 12px;
    padding: 12px; cursor: pointer; font: inherit; color: inherit;
    box-shadow: var(--shadow-rest);
    display: flex; flex-direction: column; gap: 8px;
    transition: all 160ms ease;
  }
  .kb-card:hover { transform: translateY(-1px); border-color: var(--lavender-300); }
  .kb-card.on { border-color: var(--indigo); box-shadow: 0 0 0 2px var(--lavender-100); }
  .kb-card-hd { display: flex; align-items: center; gap: 8px; }
  .kb-card-id { flex: 1; min-width: 0; }
  .kb-brand { font-size: 13px; font-weight: 800; line-height: 1.2; }
  .kb-owner { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .kb-card-cat { font-size: 11.5px; color: var(--muted); }
  .kb-card-foot { display: flex; gap: 12px; font-size: 11px; color: var(--muted); padding-top: 8px; border-top: 1px solid var(--line-quiet); }
  .kb-card-foot strong { color: var(--text); font-variant-numeric: tabular-nums; }
  .kb-code { font-family: var(--font-mono); font-size: 10.5px; color: var(--success); font-weight: 800; }
  .kb-actions { display: flex; gap: 6px; padding-top: 6px; }
  .kb-actions .btn-mini { flex: 1; justify-content: center; }

  /* ─── Modals + flows ─────────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(28,24,56,.55);
    backdrop-filter: blur(4px); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    animation: backdrop-in 200ms ease;
  }
  .modal {
    background: var(--panel); border-radius: 20px;
    box-shadow: var(--shadow-pop); position: relative;
    max-height: 90vh; overflow-y: auto;
    animation: modal-in 260ms cubic-bezier(.2,.7,.2,1);
  }
  @keyframes modal-in { from { transform: translateY(20px) scale(.97); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
  .modal-x {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; border-radius: 8px;
    border: none; background: var(--bg-soft); color: var(--muted);
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    transition: all 160ms ease; z-index: 2;
  }
  .modal-x:hover { background: var(--line); color: var(--text); }

  .approve { padding: 32px 32px 28px; }
  .approve-eyebrow {
    font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    color: var(--success); display: inline-flex; align-items: center; gap: 6px;
    background: var(--success-bg); padding: 4px 10px; border-radius: 999px;
  }
  .approve-eyebrow.danger { color: var(--danger); background: var(--danger-bg); }
  .approve-eyebrow.info   { color: var(--info);   background: var(--info-bg); }
  .approve-h { margin-top: 12px; font-size: 26px; }
  .approve-sub { margin-top: 6px; font-size: 14px; line-height: 1.5; }

  .approve-card {
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px; margin-top: 20px;
  }
  .approve-card-row { display: flex; align-items: center; gap: 12px; padding-bottom: 14px; border-bottom: 1px solid var(--line-quiet); }
  .approve-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; padding-top: 14px; }
  .approve-k { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .approve-v { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 2px; }

  .approve-field { margin-top: 20px; }
  .approve-label { display: block; font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .approve-textarea {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--panel);
    font: inherit; font-size: 13px; color: var(--text); resize: vertical;
    transition: all 160ms ease;
  }
  .approve-textarea:focus { outline: none; border-color: var(--lavender-300); box-shadow: 0 0 0 4px var(--lavender-100); }

  .tier-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tier-card {
    text-align: left; border: 1.5px solid var(--line);
    background: var(--panel); border-radius: 14px; padding: 14px;
    cursor: pointer; font: inherit; color: inherit;
    transition: all 160ms ease;
  }
  .tier-card:hover { border-color: var(--lavender-300); }
  .tier-card.on { border-color: var(--indigo); background: var(--indigo-50); box-shadow: 0 0 0 3px var(--lavender-100); }
  .tier-h { font-size: 14px; font-weight: 800; }
  .tier-d { font-size: 11.5px; color: var(--muted); line-height: 1.4; margin-top: 6px; }
  .tier-meta { font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 10px; display: flex; align-items: center; gap: 6px; }

  .approve-check {
    display: flex; gap: 10px; align-items: flex-start;
    margin-top: 16px; padding: 12px 14px; border-radius: 12px;
    background: var(--bg-soft); font-size: 12.5px; line-height: 1.5; color: var(--text);
    cursor: pointer;
  }
  .approve-check input { margin-top: 2px; accent-color: var(--indigo); }

  .approve-foot { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

  /* reject presets */
  .reject-presets { display: flex; flex-direction: column; gap: 6px; }
  .reject-preset {
    text-align: left; border: 1px solid var(--line); background: var(--panel);
    border-radius: 10px; padding: 10px 12px;
    font: inherit; font-size: 12.5px; color: var(--text); cursor: pointer;
    transition: all 160ms ease;
  }
  .reject-preset:hover { border-color: var(--lavender-300); background: var(--lavender-100); }
  .reject-preset.on { border-color: var(--indigo); background: var(--indigo-50); color: var(--indigo); font-weight: 700; }

  /* Generating step */
  .generating { padding: 48px 32px; text-align: center; }
  .gen-mascot { position: relative; width: 96px; height: 96px; margin: 0 auto; }
  .gen-mascot img { width: 96px; height: 96px; position: relative; z-index: 1; animation: bob 1.6s ease-in-out infinite; }
  .gen-spin {
    position: absolute; inset: -10px; border-radius: 50%;
    border: 2px solid var(--lavender-100); border-top-color: var(--indigo); border-right-color: var(--lavender-700);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .gen-steps { list-style: none; padding: 0; margin: 28px auto 0; max-width: 320px; text-align: left; display: flex; flex-direction: column; gap: 12px; }
  .gen-steps li { font-size: 13px; font-weight: 700; color: var(--muted-soft); display: flex; align-items: center; gap: 10px; }
  .gen-steps li.done { color: var(--success); }
  .gen-steps li.doing { color: var(--text); }
  .gen-steps li svg { color: var(--success); background: var(--success-bg); border-radius: 50%; padding: 2px; }
  .gen-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--line); display: inline-block; }
  .gen-dot-spin { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--lavender-200); border-top-color: var(--indigo); display: inline-block; animation: spin .8s linear infinite; }

  /* Success step */
  .success { padding: 32px 32px 28px; }
  .success-burst { position: relative; width: 80px; height: 80px; margin: 8px auto 0; }
  .success-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: var(--success-bg);
    animation: ring-pulse 1.6s ease-out;
  }
  .success-check {
    position: absolute; inset: 0; border-radius: 50%;
    background: var(--success); color: white;
    display: flex; align-items: center; justify-content: center;
    margin: 12px;
    animation: pop 360ms cubic-bezier(.2,1.8,.4,1);
  }
  @keyframes ring-pulse { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes pop { 0% { transform: scale(.4); } 100% { transform: scale(1); } }

  .success-code-card {
    margin-top: 22px; background: linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
    border: 1.5px dashed rgba(45,41,96,.18); border-radius: 14px; padding: 18px;
  }
  .success-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--text-2); }
  .success-code-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .success-code {
    flex: 1; font-family: var(--font-mono); font-weight: 800;
    font-size: 22px; letter-spacing: .02em; color: var(--indigo);
    background: rgba(255,255,255,.55); padding: 10px 14px; border-radius: 10px;
    text-align: center; user-select: all;
  }
  .btn-copy {
    background: var(--indigo); color: white; border: none;
    padding: 10px 14px; border-radius: 10px; font-size: 12.5px; font-weight: 800;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: all 160ms ease;
  }
  .btn-copy:hover { background: var(--indigo-700); }
  .btn-copy.copied { background: var(--success); }
  .success-ws { margin-top: 12px; font-size: 12.5px; color: var(--text-2); display: flex; align-items: center; gap: 6px; font-weight: 700; }
  .success-ws strong { color: var(--indigo); }

  .success-next { margin-top: 20px; }
  .next-list { list-style: none; padding: 0; margin: 10px 0 0; display: flex; flex-direction: column; gap: 14px; }
  .next-list li { display: flex; gap: 12px; font-size: 13px; line-height: 1.5; }
  .next-bull {
    width: 22px; height: 22px; flex-shrink: 0; border-radius: 50%;
    background: var(--indigo-50); color: var(--indigo);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
  }

  /* ─── Toast ──────────────────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white;
    padding: 12px 18px; border-radius: 12px;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow-pop); z-index: 300;
    animation: toast-in 280ms cubic-bezier(.2,.7,.2,1);
  }
  @keyframes toast-in { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  .toast-ok svg { color: #5ee0a0; }
  .toast-warn svg { color: #f6c66e; }

  /* warmth modifiers */
  .warmth-minimal .hd-mascot { display: none; }

  /* responsive small */
  @media (max-width: 1200px) {
    .split { grid-template-columns: 380px 1fr; }
    .kanban { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- App scripts -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="flows.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="react">
  // ── Tweak defaults — host rewrites this block on persist ───────────────────
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "layout": "split",
    "density": "regular",
    "warmth": "balanced",
    "queueSize": 12
  }/*EDITMODE-END*/;

  function Root() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    return (
      <React.Fragment>
        <ApplicationsApp t={t} setTweak={setTweak} />
        <TweaksPanel>
          <TweakSection label="Layout" />
          <TweakRadio
            label="View"
            value={t.layout}
            options={[
              { value: "split",  label: "Split" },
              { value: "table",  label: "Table" },
              { value: "kanban", label: "Board" }
            ]}
            onChange={(v) => setTweak("layout", v)}
          />
          <TweakRadio
            label="Density"
            value={t.density}
            options={[
              { value: "compact", label: "Compact" },
              { value: "regular", label: "Regular" },
              { value: "comfy",   label: "Comfy" }
            ]}
            onChange={(v) => setTweak("density", v)}
          />
          <TweakSection label="Brand warmth" />
          <TweakRadio
            label="Mascot use"
            value={t.warmth}
            options={[
              { value: "minimal",  label: "Minimal" },
              { value: "balanced", label: "Balanced" },
              { value: "generous", label: "Generous" }
            ]}
            onChange={(v) => setTweak("warmth", v)}
          />
          <TweakSection label="Data scenarios" />
          <TweakSlider
            label="Queue size"
            value={t.queueSize}
            min={0}
            max={13}
            step={1}
            unit=" apps"
            onChange={(v) => setTweak("queueSize", v)}
          />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>

</body>
</html>
